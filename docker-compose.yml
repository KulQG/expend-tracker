services:
  postgres:
    image: postgres:16-alpine
    container_name: expend-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./expenditure-tracker-backend
      dockerfile: Dockerfile
    container_name: expend-tracker-backend
    restart: unless-stopped
    environment:
      PORT: ${BACKEND_PORT}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NODE_ENV: ${NODE_ENV}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./expenditure-tracker-frontend
      dockerfile: Dockerfile
      args:
        VITE_PUBLIC_API_URL: ${VITE_PUBLIC_API_URL}
        VITE_PUBLIC_API_URL_EXPENDITURES: ${VITE_PUBLIC_API_URL_EXPENDITURES}
    container_name: expend-tracker-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
